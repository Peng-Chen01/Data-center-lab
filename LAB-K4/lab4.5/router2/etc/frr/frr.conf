!
! FRRouting configuration file
!
password zebra
enable password zebra
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
!
router bgp 2
no bgp ebgp-requires-policy
! no bgp network import-check (not needed for this lab)
neighbor 2.2.2.10 remote-as 1
neighbor 2.2.2.10 description Router 1 of AS1
neighbor 4.4.4.30 remote-as 3
neighbor 4.4.4.30 description Router 3 of AS3
!
network 3.3.3.0/24
network 4.4.4.0/24
